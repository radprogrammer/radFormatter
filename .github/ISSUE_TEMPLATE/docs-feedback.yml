name: Documentation feedback
description: Report unclear, incorrect, or missing public documentation.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: input
    id: page
    attributes:
      label: Documentation page
      description: Paste the URL or page title.
      placeholder: "Example: https://radprogrammer.com/radFormatter/docs/config-options.html"
    validations:
      required: true

  - type: dropdown
    id: issue-type
    attributes:
      label: Feedback type
      options:
        - Incorrect information
        - Missing information
        - Confusing wording
        - Broken link or navigation
        - Example does not work
        - Other
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: What the docs say now
      description: Quote or summarize the part that needs attention.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What would be clearer or correct?
      description: Describe the change you expected.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add version, command, config, or browser details if relevant.
