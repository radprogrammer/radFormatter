name: Feature request
description: Suggest a formatting option, workflow, profile, or integration improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this for new formatting options, profile changes, CLI or IDE workflow improvements, and integration requests.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Formatting behavior
        - Configuration option
        - Built-in profile
        - CLI workflow
        - IDE plugin workflow
        - CI integration
        - Installer or updates
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What workflow, formatting style, or project need is not covered today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the behavior or option you would like.
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: Show before/after formatting examples if this is about output.
      render: pascal

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention any current workaround, existing profile, or config option you tried.

  - type: input
    id: delphi-version
    attributes:
      label: Delphi / RAD Studio version, if relevant
      placeholder: "Example: RAD Studio 13 Florence"
